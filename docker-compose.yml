services:
  react-app:
    image: volkalabs/portafolio:latest
    build:
      context: .
      target: ${APP_TARGET} 
    container_name: react_frontend
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - volkalabs_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.react-app.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.services.react-app.loadbalancer.server.port=${APP_PORT}"
      
      - "traefik.http.routers.react-app.tls=${ENABLE_TLS}"
      - "traefik.http.routers.react-app.tls.certresolver=${CERT_RESOLVER}"
networks:
  volkalabs_network:
    name: volkalabs
    external: true